<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
     <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
     <link href="../output.css" rel="stylesheet">
</head>
<body class="h-screen w-screen  bg-pink-200 ">
    <div class="max-w-6xl mx-auto px-4">
    
      <div class="h-12 bg-white w-full m-4 rounded-xl flex items-center justify-between p-1.5"  id="navbar">
        <div class="font-script text-5xl font-extrabold">StreeShakti</div>
        <div class="flex items-center space-x-2 bg-gray-100 px-4 py-2 rounded-lg">
            <svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="micIcon" class="w-5 h-5 text-gray-500 hover:text-blue-500 cursor-pointer transition-colors">
                <path id="voice_btn"stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.727 4.73A1 1 0 0 1 7.914 5a9 9 0 1 0 12.172 12.172 1 1 0 0 1-1.183.682 8.986 8.986 0 0 1-12.933-12.933 1 1 0 0 1 .682-1.186zM19.114 5.636A9 9 0 0 0 4.886 18.364m0 0a9 9 0 0 0 12.728-12.728M4.886 18.364A1 1 0 0 0 5.073 19h3.182a1 1 0 0 1 1-.999 7.5 7.5 0 0 1 6.536-3.658 1 1 0 0 1 .999 1v3.182a1 1 0 0 1-.999 1H5.073a1 1 0 0 1-.187-1.999z" />
            </svg>
            <input type="text"  id="search_bar" placeholder="Search... or click mic to speak" class="bg-transparent outline-none border-none text-sm placeholder-gray-500 flex-1">
            <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-md text-sm font-medium transition-colors" id="go_btn">Go</button>
        </div>

        <div> 
            <img id="profile_btn"
  src="https://pngtree.com/so/profile-icon" 
  alt="profile" 
  class="w-10 h-10 rounded-full object-cover cursor-pointer"
/> </div>
      </div>
      <div class="flex gap-4 mt-4" >
     <aside class="w-64 bg-white p-4 shadow min-h-screen" id="filters">

  <h2 class="text-lg font-semibold mb-4">Filters</h2>

  <!-- Filter Section -->
  <div class="space-y-4" >

    <!-- Job Type -->
    <div id="skills_filter">
      <h3 class="font-medium mb-2" >Skills</h3>
      <div class="space-y-1 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="weaving"> Weaving
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="farming"> Farming
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="tailoring"> Tailoring
        </label>
        
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="cooking"> Cooking
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill"  value="anganwadi"> Anganwadi
        </label>
        
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="handicrafts"> Handicrafts
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="factory_work"> Factory waork
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_skill" value="household_work"> Household work
        </label>
      </div>
    </div>

    <!-- Location -->
    <div id="skills_filter">
      <h3 class="font-medium mb-2" >Location</h3>
      <div class="space-y-1 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_location" value="under_500m"> Under 500m
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_location" value="under_2km"> Under 2km
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_location" value="under_5km"> Under 5km
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_location" value="more_than_5km"> More than 5km
        </label>
      </div>
    </div>

    <!-- Salary -->
    <div  id="salary_container">
      <h3 class="font-medium mb-2">Salary</h3>
      <div class="space-y-1 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_salary" value="under_2k"> Under 2k
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_salary" value="under_5k"> Under 5k
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_salary" value="under_10k">Under 10k
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_salary" value="above_10k">Above 10k
        </label>

         </div>

  <div id="wfh_filter">
      <h3 class="font-medium mb-2" >Work from Home</h3>
      <div class="space-y-1 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_wfh" value="yes"> Yes
        </label>
        <label class="flex items-center gap-2">
          <input type="checkbox" name="filter_wfh" value="no"> No
        </label>
        
      </div>
    </div>
        
      </div>
      <button id="apply_filters_btn">Apply Filters</button>
    </div>

 

</aside>
<main class="flex-1 mt-10 mr-20 ml-10" id="job_list_container">
  <div class="border shadow-lg rounded-lg bg-white pb-10">
    <div class="bg-pink-400 flex justify-center items-center h-24 font-bold  text-xl rounded-t-lg">Jobe name</div>
    <div class="text-center mt-4">
      <h2>description about the job</h2>
      <p>ratings</p>
      <button class="bg-blue-400 text-white mt-6">Check out now </button>
    </div>
    </div>
  </main>
</div>

</div>
<script src="auth.js" ></script>
<script src="dashboard.js" ></script>
</body>
</html>
