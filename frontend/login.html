<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind</title>
    <link rel="stylesheet" href="output.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body class="h-screen w-screen  bg-pink-400">

  <h1 class="font-script text-7xl font-extrabold text-center mt-20">
  Namaste
</h1>
<div class="mt-16 bg-white p-6 rounded-lg shadow-md shadow-purple-600 max-w-sm mx-auto">
<form class="flex flex-col space-y-4">

    <div class="flex items-center gap-4">
      <p class="mb-2 font-semibold">Who are you?</p>
    <label class="block mb-2">
    <input type="radio" name="userType" value="business" class="mr-2">
    Business
  </label>

  <label class="block mb-4">
    <input type="radio" name="userType" value="job_seeker" class="mr-2">
    Job Seeker
  </label>

  </div>

  <div>
    <label class="mb-1 font-bold" >Phone no.</label>
    <input class="border p-2 rounded" id="phone_input"
           maxlength="10" placeholder="Enter 10 digit mobile number" >
  </div>

  
   <button class="bg-blue-500 text-white p-2 rounded" id="verify_btn">Get OTP</button>

</form>
<script src="auth.js" ></script>
</div>


</html>
