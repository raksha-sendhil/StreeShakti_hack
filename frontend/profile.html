<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
     <link rel="stylesheet" href="../output.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class=" bg-gradient-to-b from-pink-500 to-pink-200 min-h-screen">
   <div class="max-w-6xl mx-auto px-4">
    
      <div class="h-12 bg-white w-full m-4 rounded-xl flex items-center justify-between p-1.5"  id="navbar">
        <div class="font-script text-5xl font-extrabold">StreeShakti</div>
        <div class="flex items-center space-x-2 bg-gray-100 px-4 py-2 rounded-lg">
            <svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="micIcon" class="w-5 h-5 text-gray-500 hover:text-blue-500 cursor-pointer transition-colors">
                <path id="voice_btn"stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.727 4.73A1 1 0 0 1 7.914 5a9 9 0 1 0 12.172 12.172 1 1 0 0 1-1.183.682 8.986 8.986 0 0 1-12.933-12.933 1 1 0 0 1 .682-1.186zM19.114 5.636A9 9 0 0 0 4.886 18.364m0 0a9 9 0 0 0 12.728-12.728M4.886 18.364A1 1 0 0 0 5.073 19h3.182a1 1 0 0 1 1-.999 7.5 7.5 0 0 1 6.536-3.658 1 1 0 0 1 .999 1v3.182a1 1 0 0 1-.999 1H5.073a1 1 0 0 1-.187-1.999z" />
            </svg>
            
            <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-md text-sm font-medium transition-colors" id="go_btn">Go</button>
        </div>

        <div> 
            <img id="profile_btn"
  src="https://pngtree.com/so/profile-icon" 
  alt="profile" 
  class="w-10 h-10 rounded-full object-cover cursor-pointer"
/> </div>
      </div>
    
    <div class="flex items-start gap-10 ml-32 mt-10">

  <!-- Image -->
  <img  id="pfp"
    src="woman picture .png" 
    class="w-64 h-64 object-cover rounded-full border border-black"
    alt="image"
  />

  <!-- Details -->
  <div class="flex flex-col gap-3 mt-20">

    <p id="pfp_name" class="text-4xl font-bold">Name</p>
    <p id="pfp_phone">Phone Number</p>
    <p id="pfp_location" class="flex items-center gap-2">
  <svg xmlns="http://www.w3.org/2000/svg" 
       class="w-5 h-5 text-pink-500" 
       fill="none" 
       viewBox="0 0 24 24" 
       stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
      d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
      d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
  </svg>
  Location
</p>

  </div>

</div>



   
<div id="pfp_skills" class="mt-10 ml-20">
      <h3 class="font-medium text-4xl font-bold" >Skills</h3>
      <div class="w-100 h-[2px] bg-purple-400 mt-2 rounded-full"></div>
      
      <div class="space-y-1 text-sm">
        <div class="flex gap-10">
        <div >
        <label class="flex items-center gap-2 text-lg ">
          <input type="checkbox" name="skill_pfp" value="weaving"> Weaving
        </label>
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="farming"> Farming
        </label>
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="tailoring"> Tailoring
        </label>
        
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="cooking"> Cooking
        </label>
        </div>
        <div >
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp"  value="anganwadi"> Anganwadi
        </label>
        
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="handicrafts"> Handicrafts
        </label>
        
        
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="factory_work"> Factory waork
        </label>
        <label class="flex items-center gap-2 text-lg">
          <input type="checkbox" name="skill_pfp" value="household_work"> Household work
        </label>
        </div>
        </div>
      </div>
    </div>
    <div id="pfp_job" class="mt-20 ml-20 ">
      <h3 class="font-medium text-4xl font-bold" >Jobs Applied</h3>
      <div class="w-100 h-[2px] bg-purple-400 mt-2 rounded-full"></div>
      <ol>
  <li>job 1</li>
  <li>job 2</li>
  <li>job 3</li>
</ol>





    
 










    
</body>
</html>
