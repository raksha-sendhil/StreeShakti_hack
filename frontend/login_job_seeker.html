

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind</title>
    <link rel="stylesheet" href="output.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-pink-200 via-pink-400 to-blue-400 min-h-screen">

  <div class="flex items-center justify-center gap-6 mt-20">

  <!-- Text -->
  <h1 class="font-script text-7xl font-extrabold">
    Namaste
  </h1>
  

  
  <!-- Image -->
  <img 
    src="namaste3.0.png" 
    class="w-36 h-36 rounded-full object-cover border-4 border-white shadow-lg"
    alt="logo"
  />

</div>
<div class="mt-16 bg-white p-6 rounded-lg shadow-md shadow-purple-600 max-w-sm mx-auto">
<form class="flex flex-col space-y-4">

   

  <div>
    <label class="mb-1 font-bold " >Phone no.</label>
    <input class="border p-2 rounded" id="phone_input"
           maxlength="10" placeholder="Enter 10 digit mobile number" >
  </div>

  
   <button class="bg-blue-500 text-white p-2 rounded" id="verify_btn">Get OTP</button>

</form>
<script src="auth.js" ></script>
</div>


</html>
