<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details – StreeShakti</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="output.css" rel="stylesheet">
</head>
<body>
  <div class="max-w-6xl mx-auto px-4">

    <!-- Navbar -->
    <div class="h-12 bg-white w-full m-4 rounded-xl flex items-center justify-between p-1.5" id="navbar">
      <div class="font-script text-5xl font-extrabold">StreeShakti</div>
      <div class="flex items-center space-x-2 bg-gray-100 px-4 py-2 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
             id="micIcon" class="w-5 h-5 text-gray-500 hover:text-blue-500 cursor-pointer transition-colors">
          <path id="voice_btn" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.727 4.73A1 1 0 0 1 7.914 5a9 9 0 1 0 12.172 12.172 1 1 0 0 1-1.183.682 8.986 8.986 0 0 1-12.933-12.933 1 1 0 0 1 .682-1.186zM19.114 5.636A9 9 0 0 0 4.886 18.364m0 0a9 9 0 0 0 12.728-12.728M4.886 18.364A1 1 0 0 0 5.073 19h3.182a1 1 0 0 1 1-.999 7.5 7.5 0 0 1 6.536-3.658 1 1 0 0 1 .999 1v3.182a1 1 0 0 1-.999 1H5.073a1 1 0 0 1-.187-1.999z"/>
        </svg>
        <input type="text" id="search_bar" placeholder="Search... or click mic to speak"
               class="bg-transparent outline-none border-none text-sm placeholder-gray-500 flex-1">
        <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-md text-sm font-medium transition-colors" id="go_btn">Go</button>
      </div>
      <div>
        <img id="profile_btn" src="https://pngtree.com/so/profile-icon" alt="profile"
             class="w-10 h-10 rounded-full object-cover cursor-pointer"/>
      </div>
    </div>

    <h1 class="mt-20 flex justify-center font-extrabold text-3xl underline" id="title_job">Loading...</h1>

    <div class="space-y-1 text-sm">
      <div class="flex mt-20">
        <div class="w-1/2">
          <div class="ml-10" id="location_job">📍 Location: </div>
          <div class="ml-10" id="salary_job">💰 Salary: </div>
          <div class="ml-10" id="hours_job">🕐 Work Hours: </div>
          <div class="ml-10" id="skills_job">🛠 Skills: </div>
        </div>
        <div class="w-1/2">
          <div class="ml-10" id="emp_name">🏢 Employer: </div>
          <div class="ml-10" id="emp_ratings">⭐ Ratings: </div>
          <div class="ml-10" id="emp_hires">🤝 Previous Hires: </div>
        </div>
      </div>
    </div>

    <!-- Reviews -->
    <div class="mt-10 ml-10 mr-10" id="reviews_container"></div>

    <div class="flex justify-center items-center mt-10 mb-10">
      <button class="bg-green-400 rounded-lg text-white px-8 py-3 font-medium" id="apply_btn">Apply Now</button>
    </div>

  </div>

  <script src="auth.js"></script>
  <script src="job_details.js"></script>
</body>
</html>
